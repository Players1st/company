{{ $section := .Site.Params.pmCoaching.section9 }}
{{ $posts   := index $section "posts" }}

<section class="section section-secondary">
  <div class="container">
    <div class="title-wrapper has-text-centered">
      <h2 class="title is-2 is-spaced has-text-white">{{ $section.title }}</h2>
      <div class="divider is-centered"></div>
    </div>
    <div class="content-wrapper">
      <div class="columns is-centered">
        {{ range $posts }}
        <div class="column is-5">
          <div class="card">
            <div class="card-content">
              <a href="{{ .link }}" class="content is-size-5 has-text-weight-bold">{{ .title }}</a>
            </div>
          </div>
        </div>
        {{ end }}
      </div>
    </div>
  </div>
</section>
